# Local development profile — H2 in-memory, no PostgreSQL needed
spring.datasource.url=jdbc:h2:file:./data/kostone;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

app.jwt.signing-key=local-dev-signing-key-must-be-at-least-256-bits-long
app.jwt.expiration-ms=86400000
app.jwt.customer-expiration-ms=604800000
app.base-url=http://localhost:5173
app.upload-dir=uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.port=9001
kostone.system.email=kostonemarble@gmail.com

# Mail and Twilio are NOT configured in local dev.
# StubNotificationAdapter is used — magic links are shown in the UI instead of being sent.
# To enable real sending: set TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, KOSTONE_EMAIL_PASSWORD in Railway.
