# Local development profile — H2 in-memory, no PostgreSQL needed
spring.datasource.url=jdbc:h2:file:./data/kostone;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

app.jwt.signing-key=local-dev-signing-key-must-be-at-least-256-bits-long
app.jwt.expiration-ms=86400000
app.jwt.customer-expiration-ms=604800000
app.base-url=http://localhost:5173
app.upload-dir=uploads
server.port=9001
kostone.system.email=kostonemarble@gmail.com

# Disable mail and Twilio in local dev (stub adapter used instead)
spring.mail.host=
twilio.account-sid=
twilio.auth-token=
