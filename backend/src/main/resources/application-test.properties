spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

app.jwt.signing-key=test-signing-key-must-be-at-least-256-bits-long-for-hmac-sha
app.jwt.expiration-ms=3600000
app.jwt.customer-expiration-ms=604800000
app.base-url=http://localhost:5173
