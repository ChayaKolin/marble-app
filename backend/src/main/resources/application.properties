spring.application.name=kostone-marble

# ── Database (required — set in Railway Variables) ────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Mail (optional — app works without it; set KOSTONE_EMAIL_PASSWORD to enable)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${KOSTONE_SYSTEM_EMAIL:kostonemarble@gmail.com}
spring.mail.password=${KOSTONE_EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── JWT (required) ────────────────────────────────────────────────────────────
app.jwt.signing-key=${JWT_SIGNING_KEY}
app.jwt.expiration-ms=86400000
app.jwt.customer-expiration-ms=604800000

# ── Twilio WhatsApp (optional) ────────────────────────────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

# ── Storage ───────────────────────────────────────────────────────────────────
app.upload-dir=${UPLOAD_DIR:/tmp/uploads}
app.storage.bucket-endpoint=${STORAGE_BUCKET_ENDPOINT:}
app.base-url=${BASE_URL:http://localhost:5173}
kostone.system.email=${KOSTONE_SYSTEM_EMAIL:kostonemarble@gmail.com}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
